services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobpilot
      POSTGRES_USER: jobpilot
      POSTGRES_PASSWORD: jobpilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobpilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://db:5432/jobpilot
      DB_USER: jobpilot
      DB_PASSWORD: jobpilot
      CORS_ORIGINS: "http://localhost:8081"
      # OPENAI_API_KEY: "sk-..."   # optionnel : active la generation par LLM
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  pgdata:
